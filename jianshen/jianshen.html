
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>FitFlow · 读秒健身训练</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet" defer>
  <style>
    :root {
      --mint: #00C9A7;
      --mint-light: #E8FAF7;
      --mint-mid: #B2EFE6;
      --coral: #FF6B6B;
      --coral-light: #FFF0F0;
      --navy: #1A2340;
      --slate: #4A5568;
      --fog: #F7F9FC;
      --white: #FFFFFF;
      --border: #E2E8F0;
      --shadow: 0 4px 24px rgba(26,35,64,0.08);
      --shadow-lg: 0 12px 48px rgba(26,35,64,0.14);
      --radius: 20px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--fog);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--mint);
      letter-spacing: 2px;
    }
    .logo span { color: var(--navy); }
    .topbar-actions { display: flex; gap: 8px; }
    .btn-ghost {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 7px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--slate);
      cursor: pointer;
      transition: all .18s;
    }
    .btn-ghost:hover { border-color: var(--mint); color: var(--mint); background: var(--mint-light); }

    /* ── LAYOUT ── */
    .app-shell {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 0;
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
      min-height: calc(100vh - 60px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      padding-right: 20px;
    }
    .sidebar-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .sidebar-header {
      background: linear-gradient(135deg, var(--navy) 0%, #2D3A5E 100%);
      padding: 20px;
      color: white;
    }
    .sidebar-header h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .sidebar-header p {
      font-size: 13px;
      opacity: .65;
    }
    .total-time-badge {
      display: inline-block;
      background: rgba(255,255,255,.15);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 10px;
      color: var(--mint);
    }

    .menu-list {
      list-style: none;
      padding: 12px 0;
      max-height: 65vh;
      overflow-y: auto;
    }
    .menu-list::-webkit-scrollbar { width: 4px; }
    .menu-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      font-size: 14px;
      color: var(--slate);
      transition: all .15s;
      cursor: default;
    }
    .menu-item.rest { color: #C0C8D8; font-size: 13px; }
    .menu-item.active {
      background: var(--mint-light);
      color: var(--navy);
      font-weight: 600;
      border-right: 3px solid var(--mint);
    }
    .menu-item.done { color: #A0AEC0; }
    .menu-item.done .item-name { text-decoration: line-through; }
    .item-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--fog);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .menu-item.active .item-num { background: var(--mint); color: white; }
    .menu-item.done .item-num { background: #E2E8F0; color: #A0AEC0; }
    .item-name { flex: 1; }
    .item-secs {
      font-size: 12px;
      font-weight: 600;
      background: var(--fog);
      border-radius: 6px;
      padding: 2px 7px;
      color: var(--slate);
    }
    .menu-item.active .item-secs { background: var(--mint); color: white; }

    /* ── MAIN ── */
    .main-area { display: flex; flex-direction: column; gap: 20px; }

    /* Hero Card */
    .hero-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }
    .hero-bg-accent {
      position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, var(--mint-light) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-inner {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 0;
      min-height: 320px;
    }
    .hero-content { padding: 40px 40px 32px; display: flex; flex-direction: column; justify-content: center; }
    .hero-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--mint);
      margin-bottom: 12px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--mint);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{ transform:scale(1); opacity:1; }
      50%{ transform:scale(1.4); opacity:.6; }
    }
    .status-dot.idle { background: #CBD5E0; animation: none; }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 6vw, 72px);
      line-height: 1;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .hero-subtitle {
      font-size: 15px;
      color: var(--slate);
      margin-bottom: 32px;
    }

    /* countdown ring */
    .countdown-ring-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      margin-bottom: 24px;
    }
    .ring-svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--fog); stroke-width: 8; }
    .ring-progress {
      fill: none;
      stroke: var(--mint);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset .9s linear;
    }
    .ring-progress.rest-ring { stroke: #94A3B8; }
    .ring-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      color: var(--navy);
      letter-spacing: 1px;
    }
    .ring-num.rest-num { color: #94A3B8; font-size: 36px; }

    /* action image */
    .hero-image-side {
      background: linear-gradient(160deg, var(--mint-light) 0%, var(--fog) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .hero-image-side img {
      width: 100%;
      max-width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      box-shadow: 0 8px 24px rgba(0,0,0,.1);
      transition: opacity .3s;
    }

    /* buttons */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--mint);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
      box-shadow: 0 4px 16px rgba(0,201,167,.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,201,167,.4); }
    .btn-primary:active { transform: translateY(0); }
    .btn-music {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--slate);
      cursor: pointer;
      transition: all .18s;
    }
    .btn-music:hover { border-color: var(--mint); color: var(--mint); }
    .btn-music.active { background: #FFF5F5; border-color: var(--coral); color: var(--coral); }
    .hero-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    /* Session Timer */
    .session-timer {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--slate);
      background: var(--fog);
      border-radius: 8px;
      padding: 8px 14px;
    }
    .session-timer span { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--navy); }

    /* Progress Bar */
    .progress-bar-wrap {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 28px;
    }
    .prog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .prog-label { font-size: 14px; font-weight: 600; color: var(--navy); }
    .prog-pct { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--mint); }
    .prog-track {
      height: 8px;
      background: var(--fog);
      border-radius: 100px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--mint), #00E5C4);
      border-radius: 100px;
      transition: width .5s ease;
      width: 0%;
    }

    /* History Panel */
    .history-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .history-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .history-header h3 { font-size: 16px; font-weight: 700; }
    .btn-clear {
      font-size: 12px;
      color: #CBD5E0;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-clear:hover { color: var(--coral); }
    .history-list { padding: 8px 0; max-height: 220px; overflow-y: auto; }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .history-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--fog);
      transition: background .12s;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: var(--fog); }
    .history-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--mint-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .history-info { flex: 1; }
    .history-date { font-size: 13px; font-weight: 600; color: var(--navy); }
    .history-detail { font-size: 12px; color: var(--slate); margin-top: 2px; }
    .history-dur {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: var(--mint);
    }
    .history-empty {
      padding: 32px 24px;
      text-align: center;
      color: #CBD5E0;
      font-size: 14px;
    }

    /* Finish overlay */
    .finish-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,35,64,.6);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .finish-overlay.show { display: flex; }
    .finish-modal {
      background: var(--white);
      border-radius: 28px;
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: var(--shadow-lg);
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn {
      from{ transform: scale(.8); opacity:0; }
      to{ transform: scale(1); opacity:1; }
    }
    .finish-emoji { font-size: 64px; margin-bottom: 16px; }
    .finish-modal h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .finish-modal p { color: var(--slate); font-size: 15px; margin-bottom: 8px; }
    .finish-stat {
      display: inline-block;
      background: var(--mint-light);
      color: var(--mint);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      border-radius: 12px;
      padding: 10px 24px;
      margin: 12px 0 28px;
    }
    .finish-modal .btn-primary { margin: 0 auto; display: flex; justify-content: center; }

    /* 移动端侧边栏折叠 */
    .sidebar-toggle {
      display: none;
      width: 100%;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--navy);
      cursor: pointer;
      text-align: left;
      margin-bottom: 4px;
      transition: all .18s;
    }
    .sidebar-toggle:hover { border-color: var(--mint); color: var(--mint); }
    .sidebar-toggle .arrow { float: right; transition: transform .25s; }
    .sidebar-toggle.open .arrow { transform: rotate(180deg); }

    .sidebar-body {
      overflow: hidden;
      transition: max-height .35s ease;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .app-shell { grid-template-columns: 1fr; padding: 16px; gap: 16px; }
      .sidebar { padding-right: 0; }

      /* 移动端侧边栏默认收起 */
      .sidebar-toggle { display: block; }
      .sidebar-body { max-height: 0; }
      .sidebar-body.open { max-height: 400px; }
      .sidebar-card { border-radius: var(--radius-sm); }
      .menu-list { max-height: 260px; }

      .hero-inner { grid-template-columns: 1fr; }
      .hero-image-side { display: none; }
      .hero-content { padding: 28px 24px; }
      .hero-title { font-size: 48px; }
    }
    @media (max-width: 480px) {
      .topbar { padding: 0 16px; }
      .hero-actions { gap: 8px; }
      .btn-primary { padding: 12px 22px; font-size: 15px; }
    }
  </style>
</head>

    </div>
  </aside>

  <!-- MAIN -->

    <div class="hero-card">

          <div class="hero-actions">

            <div class="session-timer" id="sessionTimer">
              ⏱ 本次用时 <span id="sessionTimerVal">00:00</span>
            </div>
          </div>
        </div>
        <div class="hero-image-side">
          <img id="actionImg" src="00.jpg" alt="动作图示" onerror="this.style.opacity='.3'">

      </div>
    </div>

    <!-- Progress -->
    <div class="progress-bar-wrap">
      <div class="prog-header">
        <span class="prog-label">训练进度</span>
        <span class="prog-pct" id="progPct">0%</span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    </div>

    <!-- History -->
    <div class="history-card" id="historyPanel">
      <div class="history-header">
        <h3>🗓 训练历史</h3>
        <button class="btn-clear" id="clearHistoryBtn">清空记录</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

  </main>
</div>

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let currentIndex = 0;
let countdownTimer = null;
let sessionStartTime = null;
let sessionTimerInterval = null;
let isRunning = false;
const CIRC = 2 * Math.PI * 52; // 326.73

/* ═══════════════════════════════════════════
   DOM REFS
═══════════════════════════════════════════ */
const menuList      = document.getElementById('menuList');
const heroTitle     = document.getElementById('heroTitle');
const heroSubtitle  = document.getElementById('heroSubtitle');
const statusDot     = document.getElementById('statusDot');
const statusText    = document.getElementById('statusText');
const ringProgress  = document.getElementById('ringProgress');
const ringNum       = document.getElementById('ringNum');
const actionImg     = document.getElementById('actionImg');
const startBtn      = document.getElementById('startBtn');
const sessionTimerVal = document.getElementById('sessionTimerVal');
const progFill      = document.getElementById('progFill');
const progPct       = document.getElementById('progPct');
const totalTimeBadge= document.getElementById('totalTimeBadge');
const finishOverlay = document.getElementById('finishOverlay');
const finishTime    = document.getElementById('finishTime');
const finishOkBtn   = document.getElementById('finishOkBtn');
const historyList   = document.getElementById('historyList');
const musicBtn      = document.getElementById('musicBtn');
const bgMusic       = document.getElementById('bgMusic');

/* ═══════════════════════════════════════════
   TOTAL TIME
═══════════════════════════════════════════ */
const totalSecs = menus.reduce((s, m) => s + m.time, 0);
const totalMins = Math.ceil(totalSecs / 60);
totalTimeBadge.textContent = `总计约 ${totalMins} 分钟`;

/* ═══════════════════════════════════════════
   BUILD MENU
═══════════════════════════════════════════ */
let exIdx = 1;
menus.forEach((m, i) => {
  const li = document.createElement('li');
  li.className = 'menu-item' + (m.name === '休息' ? ' rest' : '');
  li.id = 'mi' + i;

  nameEl.className = 'item-name';
  nameEl.textContent = m.name;

  secsEl.className = 'item-secs';
  secsEl.textContent = m.time + 's';

  li.append(numEl, nameEl, secsEl);
  menuList.appendChild(li);
});

/* ═══════════════════════════════════════════
   AUDIO CTX — 滴滴音效 (Web Audio API，无需外部文件)
═══════════════════════════════════════════ */
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// 短促滴声：freq=频率 dur=时长(s) vol=音量
function beep(freq = 880, dur = 0.08, vol = 0.35) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur + 0.02);
  } catch(e) {}
}

// 倒计时滴（常规）：短促高音
function beepTick() { beep(880, 0.07, 0.3); }
// 最后一声（开始/结束）：低沉长音
function beepGo()   { beep(523, 0.18, 0.45); }
// 完成音：双音
function beepDone() {
  beep(659, 0.12, 0.35);
  setTimeout(() => beep(880, 0.18, 0.4), 150);
}

/* ═══════════════════════════════════════════
   SPEECH
   关键修复：
   1. speak() 不再内部 cancel，改为队列追加
   2. 用 lastSpokenSecond 防止同一秒被 250ms 轮询触发多次
   3. 准备倒数用绝对 setTimeout，不互相 cancel
═══════════════════════════════════════════ */
let lastSpokenSecond = -1; // 防重复朗读守卫

function speak(text, rate = 1.8) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = rate;
  window.speechSynthesis.speak(u);
}

function cancelSpeech() {
  window.speechSynthesis.cancel();
  lastSpokenSecond = -1;
}

// 准备阶段倒数（5 4 3 2 1）：用独立 setTimeout，不干扰运动中语音
function scheduleCountIn(startDelayMs, onDone) {
  cancelSpeech();
  const ticks = ['5','4','3','2','1'];
  ticks.forEach((t, i) => {
    setTimeout(() => {
      beepTick();
      speak(t);
    }, startDelayMs + i * 1000);
  });
  setTimeout(() => {
    beepGo();
    if (onDone) onDone();
  }, startDelayMs + ticks.length * 1000);
}

/* ═══════════════════════════════════════════
   RING
═══════════════════════════════════════════ */
function setRing(remain, total, isRest) {
  const offset = CIRC * (1 - remain / total);
  ringProgress.style.strokeDashoffset = offset;
  ringProgress.classList.toggle('rest-ring', isRest);
  ringNum.classList.toggle('rest-num', isRest);
  ringNum.textContent = remain > 0 ? remain : (isRest ? '休息' : '✓');
}

function setRingText(text) {
  ringNum.textContent = text;
  ringProgress.style.strokeDashoffset = CIRC;
}

/* ═══════════════════════════════════════════
   PROGRESS
═══════════════════════════════════════════ */
function updateProgress(idx) {
  const done = menus.slice(0, idx).reduce((s, m) => s + m.time, 0);
  const pct = Math.round(done / totalSecs * 100);
  progFill.style.width = pct + '%';
  progPct.textContent = pct + '%';
}

/* ═══════════════════════════════════════════
   HIGHLIGHT MENU
═══════════════════════════════════════════ */
function highlightMenu(idx) {
  menus.forEach((_, i) => {
    const el = document.getElementById('mi' + i);
    el.classList.remove('active');
    if (i < idx) el.classList.add('done');
  });
  if (idx < menus.length) {
    const el = document.getElementById('mi' + idx);
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

/* ═══════════════════════════════════════════
   SESSION TIMER
═══════════════════════════════════════════ */
function fmtTime(sec) {
  const m = String(Math.floor(sec / 60)).padStart(2, '0');
  const s = String(sec % 60).padStart(2, '0');
  return m + ':' + s;
}

function startSessionTimer() {
  sessionStartTime = Date.now();
  sessionTimerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
    sessionTimerVal.textContent = fmtTime(elapsed);
  }, 1000);
}

function stopSessionTimer() {
  clearInterval(sessionTimerInterval);
}

function getElapsedSecs() {
  return Math.floor((Date.now() - sessionStartTime) / 1000);
}

/* ═══════════════════════════════════════════
   HISTORY (localStorage)
═══════════════════════════════════════════ */
function loadHistory() {
  try { return JSON.parse(localStorage.getItem('fitflow_history') || '[]'); }
  catch { return []; }
}

function saveHistory(arr) {
  localStorage.setItem('fitflow_history', JSON.stringify(arr));
}

function addHistoryRecord(durationSecs) {
  const arr = loadHistory();
  arr.unshift({
    date: new Date().toLocaleString('zh-CN'),
    duration: durationSecs,
    exercises: menus.filter(m => m.name !== '休息').length
  });
  saveHistory(arr.slice(0, 20)); // keep 20
  renderHistory();
}

function renderHistory() {
  const arr = loadHistory();
  if (arr.length === 0) {
    historyList.innerHTML = '<div class="history-empty">暂无训练记录，完成第一次训练后将在此显示</div>';
    return;
  }
  historyList.innerHTML = arr.map((r, i) => `
    <div class="history-item">
      <div class="history-icon">💪</div>
      <div class="history-info">
        <div class="history-date">${r.date}</div>
        <div class="history-detail">${r.exercises} 个动作完成</div>
      </div>
      <div class="history-dur">${fmtTime(r.duration)}</div>
    </div>
  `).join('');
}

document.getElementById('clearHistoryBtn').addEventListener('click', () => {
  if (confirm('确认清空所有训练历史？')) {
    saveHistory([]);
    renderHistory();
  }
});

/* ═══════════════════════════════════════════
   COUNTDOWN CORE
   修复要点：
   1. lastSpokenSecond 守卫：同一秒只触发一次语音/滴声
   2. 轮询仍保持 200ms（ring 动画流畅），但语音由守卫防重
   3. 过渡段（准备倒数）用 scheduleCountIn，与运动期语音不冲突
═══════════════════════════════════════════ */
function runCountdown(index) {
  if (index >= menus.length) { finish(); return; }

  const item   = menus[index];
  const isRest = item.name === '休息';
  lastSpokenSecond = item.time + 1; // 重置守卫（大于最大值，避免首帧误触）

  // UI
  heroTitle.textContent    = item.name;
  heroSubtitle.textContent = isRest ? '稍作休息，下一个动作准备中…' : `持续 ${item.time} 秒`;
  actionImg.src            = item.image;
  highlightMenu(index);
  updateProgress(index);
  statusDot.classList.remove('idle');
  statusText.textContent = isRest ? '休息中' : '运动中';

  const startAt = Date.now();

  countdownTimer = setInterval(() => {
    const elapsed = Date.now() - startAt;
    const remain  = Math.max(0, item.time - Math.floor(elapsed / 1000));

    // Ring 更新（每帧）
    setRing(remain, item.time, isRest);

    // ── 语音 + 滴声：每个整秒只触发一次 ──
    if (remain !== lastSpokenSecond) {
      lastSpokenSecond = remain;

      if (remain > 0) {
        // 鼓励语（运动项目，剩约40%时说一次）
        if (!isRest && remain === Math.floor(item.time * 0.4) && item.time > 20) {
          speak('再坚持一下');
        }
        // 最后10秒：滴声 + 报数
        if (remain <= 10) {
          beepTick();
          speak(String(remain));
        }
      }

      // 结束处理
      if (remain === 0) {
        clearInterval(countdownTimer);

        const next = menus[index + 1];
        if (!next) { finish(); return; }

        const isNextRest = next.name === '休息';

        // 切换 UI 预告
        setRingText('准备');
        heroTitle.textContent    = next.name;
        heroSubtitle.textContent = `即将开始 · ${next.time} 秒`;
        actionImg.src            = next.image;
        statusText.textContent   = '准备中';

        if (isNextRest) {
          // 休息段：直接语音提示，1.2s 后进入
          cancelSpeech();
          speak('休息 ' + next.time + '秒');
          setTimeout(() => runCountdown(index + 1), 1200);
        } else {
          // 运动段：先报动作名，再4321倒数，倒数结束后进入
          cancelSpeech();
          speak(next.name + ' ' + next.time + '秒');
          // 1s 后开始 4321（留时间让上面那句说完）
          scheduleCountIn(1000, () => runCountdown(index + 1));
        }
      }
    }
  }, 200);
}

/* ═══════════════════════════════════════════
   START
═══════════════════════════════════════════ */
startBtn.addEventListener('click', () => {
  if (isRunning) return;
  isRunning = true;

  // 解锁 AudioContext（需用户手势触发）
  getAudioCtx();

  startBtn.disabled = true;
  startBtn.style.opacity = '.5';
  startBtn.innerHTML = '训练中…';

  // 重置菜单高亮（应对再练一次场景）
  menus.forEach((_, i) => {
    const el = document.getElementById('mi' + i);
    el.classList.remove('active', 'done');
  });
  document.getElementById('mi0').classList.add('active');
  updateProgress(0);

  startSessionTimer();

  setRingText('准备');
  statusDot.classList.remove('idle');
  statusText.textContent  = '即将开始';
  heroTitle.textContent   = menus[0].name;
  heroSubtitle.textContent = '5 秒后开始，请做好准备';
  actionImg.src           = menus[0].image;

  cancelSpeech();
  speak('5秒后开始 ' + menus[0].name);
  scheduleCountIn(1000, () => runCountdown(0));
});

/* ═══════════════════════════════════════════
   FINISH
═══════════════════════════════════════════ */
function finish() {
  clearInterval(countdownTimer);
  stopSessionTimer();
  const elapsed = getElapsedSecs();

  heroTitle.textContent = '训练完成！';
  heroSubtitle.textContent = '太棒了，今天的任务全部完成 🎉';
  setRingText('🏆');
  statusDot.classList.add('idle');
  statusText.textContent = '已完成';
  actionImg.src = 'end.jpeg';

  menus.forEach((_, i) => {
    const el = document.getElementById('mi' + i);
    el.classList.remove('active');
    el.classList.add('done');
  });
  progFill.style.width = '100%';
  progPct.textContent = '100%';
  updateProgress(menus.length);

  // 恢复开始按钮
  isRunning = false;
  startBtn.disabled = false;
  startBtn.style.opacity = '1';
  startBtn.innerHTML = '↺ &nbsp;再练一次';

  speak('恭喜你，训练完成！');
  beepDone();

  finishTime.textContent = fmtTime(elapsed);
  finishOverlay.classList.add('show');

  finishOkBtn.onclick = () => {
    addHistoryRecord(elapsed);
    finishOverlay.classList.remove('show');
  };
}

/* ═══════════════════════════════════════════
   MUSIC
═══════════════════════════════════════════ */
let musicPlaying = false;
musicBtn.addEventListener('click', () => {
  if (musicPlaying) {
    bgMusic.pause();
    musicBtn.textContent = '🎵 播放音乐';
    musicBtn.classList.remove('active');
  } else {
    bgMusic.play();
    musicBtn.textContent = '⏹ 停止音乐';
    musicBtn.classList.add('active');
  }
  musicPlaying = !musicPlaying;
});
